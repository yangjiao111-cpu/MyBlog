<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>星源博客 - 记录思考与创造</title>
    <style>
      /* 默认深色背景兜底，内联脚本会立即覆盖为正确主题色 */
      html { background-color: #0f0f13; }
    </style>
    <script>
      /* 在浏览器渲染第一帧前同步设置主题，防止新标签页闪烁旧主题色 */
      ;(function() {
        var t = localStorage.getItem('theme') || 'dark'
        document.documentElement.setAttribute('data-theme', t)
        document.documentElement.style.backgroundColor = t === 'light' ? '#fafaf9' : '#0f0f13'
      })()
    </script>
    <style>
      /* 初始加载动画 - 不依赖 JS，浏览器解析 HTML 立即显示 */
      #app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.35s ease, visibility 0.35s ease;
      }
      #app-loading.fade-out {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      .app-loading__dots {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .app-loading__dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f59e42;
        animation: appLoadingBounce 1.4s ease-in-out infinite both;
      }
      html[data-theme="light"] .app-loading__dot {
        background: #e07a2f;
      }
      .app-loading__dot:nth-child(1) { animation-delay: -0.32s; }
      .app-loading__dot:nth-child(2) { animation-delay: -0.16s; }
      @keyframes appLoadingBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="app-loading">
      <div class="app-loading__dots">
        <div class="app-loading__dot"></div>
        <div class="app-loading__dot"></div>
        <div class="app-loading__dot"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
