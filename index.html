<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>星源博客 - 记录思考与创造</title>
    <script>
      /* 在 Vue 挂载前同步读取用户主题偏好，避免挂载后切换导致颜色跳变 */
      (function() {
        const theme = localStorage.getItem('theme') || 'dark'
        document.documentElement.setAttribute('data-theme', theme)
      })()
    </script>
    <style>
      /* 初始加载动画 - 不依赖 JS，浏览器解析 HTML 立即显示 */
      #app:has(> .app-loading) {
        position: fixed;
        inset: 0;
        z-index: 99999;
      }
      .app-loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f0f13;
        z-index: 99999;
        transition: opacity 0.4s ease, visibility 0.4s ease;
      }
      html[data-theme="light"] .app-loading {
        background: #fafaf9;
      }
      .app-loading__dots {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .app-loading__dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f59e42;
        animation: appLoadingBounce 1.4s ease-in-out infinite both;
      }
      html[data-theme="light"] .app-loading__dot {
        background: #e07a2f;
      }
      .app-loading__dot:nth-child(1) { animation-delay: -0.32s; }
      .app-loading__dot:nth-child(2) { animation-delay: -0.16s; }
      @keyframes appLoadingBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
        40% { transform: scale(1); opacity: 1; }
      }
      /* Vue 挂载后 .app-loading 被移除，自然消失 */
    </style>
  </head>
  <body>
    <div id="app">
      <div class="app-loading">
        <div class="app-loading__dots">
          <div class="app-loading__dot"></div>
          <div class="app-loading__dot"></div>
          <div class="app-loading__dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
